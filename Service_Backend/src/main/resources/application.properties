server.port=8000
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.expiration=${ACCESS_TOKEN_EXPIRE_MINUTES:1440}
app.gateway.token=${API_GATEWAY_TOKEN:team-wellness-2025}
app.deepseek.key=${DEEPSEEK_API_KEY}
app.rag.url=http://localhost:8001

# File upload
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m

# Volcano TTS (set in server environment - old console credentials)
app.volcano.tts.appid=${VOLCANO_TTS_APPID:}
app.volcano.tts.token=${VOLCANO_TTS_TOKEN:}
app.volcano.tts.speaker=${VOLCANO_TTS_SPEAKER:zh_female_vv_uranus_bigtts}

# i18n
spring.messages.basename=web-messages
spring.messages.encoding=UTF-8

# HTTPS (extra connector on 8443; HTTP 8000 stays for curl/server checks).
# Self-signed cert generated on the server at /home/wellness-dev/wellness-backend/ssl/wellness.p12
app.ssl.port=8443
app.ssl.key-store=/home/wellness-dev/wellness-backend/ssl/wellness.p12
app.ssl.key-store-password=wellness2026
app.ssl.key-store-type=PKCS12
app.ssl.key-alias=wellness

# Base URL for web (used by Google OAuth redirect). HTTPS endpoint for browsers.
app.web.base-url=https://152-42-181-66.nip.io
