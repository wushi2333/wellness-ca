server.port=8000
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.expiration=${ACCESS_TOKEN_EXPIRE_MINUTES:1440}
app.gateway.token=${API_GATEWAY_TOKEN:team-wellness-2025}
app.deepseek.key=${DEEPSEEK_API_KEY}
app.rag.url=http://localhost:8001
