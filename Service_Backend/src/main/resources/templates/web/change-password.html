<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Change Password</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header th:replace="web/fragments/chrome :: topbar(${activePage})"></header>

<main class="page narrow">
    <div class="detail-topbar">
        <a class="back-link" th:href="@{/web/settings}" th:text="#{common.back}">Back</a>
        <h1 th:text="#{cp.title}">Change Password</h1>
        <span></span>
    </div>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="panel" th:if="${isGoogleUser}">
        <p class="muted" th:text="#{cp.google_no_password}">Google accounts do not use password authentication.</p>
    </section>

    <form class="panel form-stack" th:unless="${isGoogleUser}" th:action="@{/web/change-password}" method="post">
        <label for="oldPassword" th:text="#{cp.current}">Current password</label>
        <input id="oldPassword" name="oldPassword" type="password" autocomplete="current-password" required>

        <label for="newPassword" th:text="#{cp.new}">New password</label>
        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>

        <label for="confirmPassword" th:text="#{cp.confirm}">Confirm new password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required>
        <p class="help-text" th:text="#{auth.password_hint}">At least 8 characters, including a letter and a digit.</p>

        <button class="button primary" type="submit" th:text="#{cp.btn}">Update Password</button>
    </form>
</main>
</body>
</html>
