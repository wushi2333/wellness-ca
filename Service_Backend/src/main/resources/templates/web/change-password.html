<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Change Password</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/web/dashboard}"><span class="brand-mark small">W</span><span>Record Your Wellness</span></a>
    <nav class="nav">
        <a th:href="@{/web/dashboard}">Dashboard</a>
        <a th:href="@{/web/records}">Records</a>
        <a th:href="@{/web/chat}">Chat</a>
        <a th:href="@{/web/insights}">Insights</a>
        <a th:href="@{/web/settings}" class="active">Settings</a>
    </nav>
    <form th:action="@{/web/logout}" method="post"><button class="icon-button" type="submit">Logout</button></form>
</header>

<main class="page narrow">
    <div class="detail-topbar">
        <a class="back-link" th:href="@{/web/settings}">Back</a>
        <h1>Change Password</h1>
        <span></span>
    </div>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="panel" th:if="${isGoogleUser}">
        <p class="muted">Google accounts do not use password authentication.</p>
    </section>

    <form class="panel form-stack" th:unless="${isGoogleUser}" th:action="@{/web/change-password}" method="post">
        <label for="oldPassword">Current password</label>
        <input id="oldPassword" name="oldPassword" type="password" autocomplete="current-password" required>

        <label for="newPassword">New password</label>
        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>

        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required>
        <p class="help-text">At least 8 characters, including a letter and a digit.</p>

        <button class="button primary" type="submit">Update Password</button>
    </form>
</main>
</body>
</html>
