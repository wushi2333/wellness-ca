<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Sleep Detail</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/web/dashboard}"><span class="brand-mark small">W</span><span>Record Your Wellness</span></a>
    <nav class="nav">
        <a th:href="@{/web/dashboard}">Dashboard</a>
        <a th:href="@{/web/records}" class="active">Records</a>
        <a th:href="@{/web/chat}">Chat</a>
        <a th:href="@{/web/insights}">Insights</a>
        <a th:href="@{/web/settings}">Settings</a>
    </nav>
    <form th:action="@{/web/logout}" method="post"><button class="icon-button" type="submit">Logout</button></form>
</header>

<main class="page">
    <div class="detail-topbar">
        <a class="back-link" th:href="@{/web/dashboard}">Back</a>
        <h1>Sleep</h1>
        <a class="button secondary compact" th:href="@{/web/records/manage/sleep}">Edit</a>
    </div>

    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <section class="stats-row three">
        <article class="stat-card">
            <strong th:text="${#numbers.formatDecimal(detail.avgSleep,1,1)}">--</strong>
            <span>Avg hours</span>
        </article>
        <article class="stat-card">
            <strong th:text="${#numbers.formatDecimal(detail.bestSleep,1,1)}">--</strong>
            <span>Best night</span>
        </article>
        <article class="stat-card">
            <strong class="warm" th:text="${#numbers.formatDecimal(detail.avgMood,1,1)}">--</strong>
            <span>Avg mood</span>
        </article>
    </section>

    <div class="week-nav">
        <a th:href="@{/web/sleep-detail(week=${prevWeek})}">Prev</a>
        <strong th:text="${detail.weekLabel}">Week</strong>
        <a th:href="@{/web/sleep-detail(week=${nextWeek})}">Next</a>
    </div>

    <section class="chart-panel">
        <div class="section-header">
            <h2>Sleep Hours</h2>
            <span>7h recommended</span>
        </div>
        <div class="bar-chart" th:attr="data-series=${#strings.listJoin(detail.sleepSeries, ',')},data-labels=${#strings.listJoin(detail.dayLabels, ',')},data-max='12',data-target='7',data-kind='sleep'"></div>
    </section>
</main>
</body>
</html>
