<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness AI - Register</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel" aria-labelledby="registerTitle">
        <p class="eyebrow">Wellness AI</p>
        <h1 id="registerTitle">Create Account</h1>

        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form class="form-stack" th:action="@{/web/register}" method="post">
            <label for="username">Username</label>
            <input id="username"
                   name="username"
                   type="text"
                   autocomplete="username"
                   th:value="${usernameInput}"
                   minlength="3"
                   maxlength="50"
                   required>

            <label for="password">Password</label>
            <input id="password"
                   name="password"
                   type="password"
                   autocomplete="new-password"
                   minlength="6"
                   maxlength="128"
                   required>

            <button class="button primary" type="submit">Register</button>
            <a class="button secondary" th:href="@{/web/login}">Back to Login</a>
        </form>
    </section>
</main>
</body>
</html>
