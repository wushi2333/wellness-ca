<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Register</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <form class="lang-toggle" th:action="@{/web/settings/language}" method="post" data-turbo="false">
            <button type="submit" name="language" value="en" th:classappend="${language == 'en'} ? 'active'">EN</button>
            <button type="submit" name="language" value="zh" th:classappend="${language == 'zh'} ? 'active'">中文</button>
        </form>
        <div class="auth-brand">
            <span class="brand-mark">W</span>
            <div>
                <p class="eyebrow" th:text="#{app.name}">Record Your Wellness</p>
                <h1 th:text="#{auth.register.title}">Create Account</h1>
            </div>
        </div>

        <p class="muted" th:text="#{auth.register.subtitle}">Join us to start your wellness journey</p>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form class="form-stack" th:action="@{/web/register}" method="post">
            <label for="username" th:text="#{auth.username}">Username</label>
            <input id="username" name="username" type="text" autocomplete="username"
                   th:value="${usernameInput}" required>

            <label for="email" th:text="#{auth.email_optional}">Email (optional)</label>
            <input id="email" name="email" type="email" autocomplete="email"
                   th:value="${emailInput}">

            <label for="password" th:text="#{auth.password}">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
            <p class="help-text" th:text="#{auth.password_hint}">At least 8 characters, including a letter and a digit.</p>

            <button class="button primary" type="submit" th:text="#{auth.btn.register}">Register</button>
        </form>

        <div class="auth-divider"><span th:text="#{auth.other_methods}">Other login methods</span></div>
        <a class="google-card" th:href="@{/web/auth/google}" th:title="#{auth.google}">
            <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        </a>

        <p class="auth-switch"><span th:text="#{auth.register.switch}">Already have an account?</span>
            <a th:href="@{/web/login}" th:text="#{auth.btn.login}">Login</a>
        </p>
    </section>
</main>
</body>
</html>
