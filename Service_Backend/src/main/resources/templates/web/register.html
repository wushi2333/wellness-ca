<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Register</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-panel">
        <div class="auth-brand">
            <span class="brand-mark">W</span>
            <div>
                <p class="eyebrow">Record Your Wellness</p>
                <h1>Create Account</h1>
            </div>
        </div>

        <p class="muted">Join us to start your wellness journey</p>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form class="form-stack" th:action="@{/web/register}" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username"
                   th:value="${usernameInput}" required>

            <label for="email">Email (optional)</label>
            <input id="email" name="email" type="email" autocomplete="email"
                   th:value="${emailInput}">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
            <p class="help-text">At least 8 characters, including a letter and a digit.</p>

            <button class="button primary" type="submit">Register</button>
        </form>

        <p class="auth-switch">Already have an account?
            <a th:href="@{/web/login}">Login</a>
        </p>
    </section>
</main>
</body>
</html>
