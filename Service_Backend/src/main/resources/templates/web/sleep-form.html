<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Sleep</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/web/dashboard}"><span class="brand-mark small">W</span><span>Record Your Wellness</span></a>
    <nav class="nav">
        <a th:href="@{/web/dashboard}">Dashboard</a>
        <a th:href="@{/web/records}" class="active">Records</a>
        <a th:href="@{/web/chat}">Chat</a>
        <a th:href="@{/web/insights}">Insights</a>
        <a th:href="@{/web/settings}">Settings</a>
    </nav>
    <form th:action="@{/web/logout}" method="post"><button class="icon-button" type="submit">Logout</button></form>
</header>

<main class="page narrow">
    <div class="page-header">
        <div>
            <p class="eyebrow" th:text="${editMode} ? 'Edit Sleep' : 'Add Sleep'">Add Sleep</p>
            <h1>Sleep</h1>
        </div>
        <a class="button secondary compact" th:href="@{/web/records}">Back</a>
    </div>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <form class="panel form-stack" th:action="@{${formAction}}" th:object="${sleep}" method="post" data-sleep-form>
        <label for="recordDate">Date</label>
        <input id="recordDate" th:field="*{recordDate}" type="date" required>
        <p class="field-error" th:if="${#fields.hasErrors('recordDate')}" th:errors="*{recordDate}"></p>

        <div class="field-grid">
            <div>
                <label for="sleepTime">Bedtime *</label>
                <input id="sleepTime" th:field="*{sleepTime}" type="time" required data-sleep-time>
                <p class="field-error" th:if="${#fields.hasErrors('sleepTime')}" th:errors="*{sleepTime}"></p>
            </div>
            <div>
                <label for="wakeTime">Wake time *</label>
                <input id="wakeTime" th:field="*{wakeTime}" type="time" required data-wake-time>
                <p class="field-error" th:if="${#fields.hasErrors('wakeTime')}" th:errors="*{wakeTime}"></p>
            </div>
        </div>

        <input th:field="*{sleepHours}" type="hidden" data-sleep-hours>
        <div class="duration-pill" data-duration-label>Duration: --</div>
        <p class="field-error" th:if="${#fields.hasErrors('sleepHours')}" th:errors="*{sleepHours}"></p>

        <label for="moodScore">Morning mood</label>
        <select id="moodScore" th:field="*{moodScore}" required>
            <option value="5">Good</option>
            <option value="3">OK</option>
            <option value="1">Low</option>
        </select>
        <p class="field-error" th:if="${#fields.hasErrors('moodScore')}" th:errors="*{moodScore}"></p>

        <label for="notes">Notes</label>
        <textarea id="notes" th:field="*{notes}" rows="4" placeholder="e.g. woke up at 3am, felt restless..."></textarea>
        <p class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></p>

        <div class="form-actions">
            <button class="button primary" type="submit" th:text="${editMode} ? 'Update Record' : 'Confirm'">Confirm</button>
            <a class="button secondary" th:href="@{/web/records}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
