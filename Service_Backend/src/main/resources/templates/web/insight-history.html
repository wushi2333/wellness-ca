<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Recommendation History</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header th:replace="web/fragments/chrome :: topbar(${activePage})"></header>

<main class="page">
    <div class="page-header">
        <div>
            <p class="eyebrow" th:text="#{insights.title}">Wellness Insights</p>
            <h1 th:text="#{insights.history_title}">Past Recommendations</h1>
        </div>
        <a class="button secondary compact" th:href="@{/web/insights}" th:text="#{common.back}">Back</a>
    </div>

    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <p class="empty-state" th:if="${#lists.isEmpty(items)}" th:text="#{insights.history_empty}">No recommendations yet.</p>

    <section class="history-list" th:if="${!#lists.isEmpty(items)}">
        <article class="history-item" th:each="item : ${items}">
            <div class="history-heading">
                <span class="muted" th:text="${item.createdAt}">2026-07-02T10:00</span>
                <form th:action="@{/web/insights/history/{id}/delete(id=${item.id})}" method="post"
                      th:attr="data-confirm=#{records.confirm_delete}">
                    <button class="delete-text" type="submit" th:text="#{records.delete}">Delete</button>
                </form>
            </div>
            <p th:text="${item.content}">Recommendation content</p>
            <details th:if="${!#lists.isEmpty(item.evidence)}">
                <summary th:text="#{insights.evidence_section}">How AI arrived at this</summary>
                <ol>
                    <li th:each="e : ${item.evidence}" th:text="${e['summary'] != null ? e['summary'] : e}">Evidence</li>
                </ol>
                <p class="muted" th:text="'Iterations: ' + ${item.iterations}">Iterations</p>
            </details>
        </article>
    </section>
</main>
</body>
</html>
