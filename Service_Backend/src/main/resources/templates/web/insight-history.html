<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness AI - Recommendation History</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/web/dashboard}">Wellness AI</a>
    <nav class="nav">
        <a th:href="@{/web/records}">Records</a>
        <a th:href="@{/web/chat}">Chat</a>
        <a th:href="@{/web/insights}" class="active">Insights</a>
    </nav>
    <form th:action="@{/web/logout}" method="post">
        <button class="link-button" type="submit">Logout</button>
    </form>
</header>

<main class="page">
    <div class="page-header">
        <div>
            <p class="eyebrow">Wellness Insights</p>
            <h1>Past Recommendations</h1>
        </div>
        <a class="button secondary compact" th:href="@{/web/insights}">Back</a>
    </div>

    <p class="empty-state" th:if="${#lists.isEmpty(items)}">No recommendations yet. Generate your first one.</p>

    <section class="history-list" th:if="${!#lists.isEmpty(items)}">
        <article class="history-item" th:each="item : ${items}">
            <span class="muted" th:text="${item.createdAt}">2026-07-02T10:00</span>
            <p th:text="${item.content}">Recommendation content</p>
            <details th:if="${item.evidence != null}">
                <summary>How AI arrived at this</summary>
                <pre th:text="${item.evidence}">Evidence</pre>
            </details>
        </article>
    </section>
</main>
</body>
</html>
