<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Records</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header th:replace="web/fragments/chrome :: topbar(${activePage})"></header>

<main class="page">
    <div class="page-header">
        <div>
            <p class="eyebrow" th:text="#{app.name}">Wellness</p>
            <h1 th:text="#{records.title}">Records</h1>
        </div>
        <a class="button primary compact" th:href="@{/web/records/new}" th:text="#{dash.new_record}">Add Record</a>
    </div>

    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="records-overview">
        <article class="record-summary sleep-summary">
            <div>
                <p class="eyebrow" th:text="#{records.sleep}">Sleep</p>
                <h2 th:text="#{manage.sleep_title}">Sleep Records</h2>
            </div>
            <a class="button secondary compact" th:href="@{/web/records/manage/sleep}" th:text="#{records.edit}">Manage</a>
        </article>
        <article class="record-summary exercise-summary">
            <div>
                <p class="eyebrow" th:text="#{records.exercise}">Exercise</p>
                <h2 th:text="#{manage.exercise_title}">Exercise Records</h2>
            </div>
            <a class="button secondary compact" th:href="@{/web/records/manage/exercise}" th:text="#{records.edit}">Manage</a>
        </article>
    </section>

    <div class="two-column">
        <section>
            <div class="section-header">
                <h2 th:text="#{records.sleep}">Recent Sleep</h2>
                <a th:href="@{/web/sleep-detail}" th:text="#{detail.avg_hours}">Detail</a>
            </div>
            <p class="empty-state" th:if="${#lists.isEmpty(sleepSections)}" th:text="#{records.empty}">No sleep records yet.</p>
            <div class="section-list" th:each="section : ${sleepSections}" th:if="${!#lists.isEmpty(sleepSections)}">
                <p class="date-label" th:text="${section.label}">Week</p>
                <article class="record-row" th:each="item : ${section.items}">
                    <div class="record-main">
                        <strong th:text="${item.date}">2026-07-02</strong>
                        <span th:text="${item.primary}">7.5h</span>
                        <span th:text="${item.secondary}">23:00 - 07:00</span>
                    </div>
                    <div class="row-actions">
                        <a class="button secondary small" th:href="@{/web/records/sleep/{id}/edit(id=${item.id})}" th:text="#{records.edit}">Edit</a>
                        <form th:action="@{/web/records/sleep/{id}/delete(id=${item.id})}" method="post"
                              th:attr="data-confirm=#{records.confirm_delete}">
                            <button class="button danger small" type="submit" th:text="#{records.delete}">Delete</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>

        <section>
            <div class="section-header">
                <h2 th:text="#{records.exercise}">Recent Exercise</h2>
                <a th:href="@{/web/exercise-detail}" th:text="#{detail.avg_hours}">Detail</a>
            </div>
            <p class="empty-state" th:if="${#lists.isEmpty(exerciseSections)}" th:text="#{records.empty}">No exercise records yet.</p>
            <div class="section-list" th:each="section : ${exerciseSections}" th:if="${!#lists.isEmpty(exerciseSections)}">
                <p class="date-label" th:text="${section.label}">Week</p>
                <article class="record-row" th:each="item : ${section.items}">
                    <div class="record-main">
                        <strong th:text="${item.date}">2026-07-02</strong>
                        <span th:text="${item.primary}">Running</span>
                        <span th:text="${item.secondary}">30 min</span>
                    </div>
                    <div class="row-actions">
                        <a class="button secondary small" th:href="@{/web/records/exercise/{id}/edit(id=${item.id})}" th:text="#{records.edit}">Edit</a>
                        <form th:action="@{/web/records/exercise/{id}/delete(id=${item.id})}" method="post"
                              th:attr="data-confirm=#{records.confirm_delete}">
                            <button class="button danger small" type="submit" th:text="#{records.delete}">Delete</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>
    </div>
</main>
</body>
</html>
