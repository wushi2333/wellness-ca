<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Your Wellness - Exercise</title>
    <link rel="stylesheet" th:href="@{/web/css/style.css}">
    <script defer th:src="@{/web/js/app.js}"></script>
</head>
<body>
<header th:replace="web/fragments/chrome :: topbar(${activePage})"></header>

<main class="page narrow">
    <div class="page-header">
        <div>
            <p class="eyebrow" th:text="${editMode} ? #{rec.exercise.edit} : #{rec.exercise.add}">Add Exercise</p>
            <h1 th:text="#{rec.exercise.title}">Exercise</h1>
        </div>
        <a class="button secondary compact" th:href="@{/web/records}" th:text="#{common.back}">Back</a>
    </div>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <form class="panel form-stack" th:action="@{${formAction}}" th:object="${exercise}" method="post">
        <label for="recordDate" th:text="#{rec.field.date}">Date</label>
        <input id="recordDate" th:field="*{recordDate}" type="date" required>
        <p class="field-error" th:if="${#fields.hasErrors('recordDate')}" th:errors="*{recordDate}"></p>

        <label for="exerciseActivity" th:text="#{rec.field.type}">Type</label>
        <select id="exerciseActivity" th:field="*{exerciseActivity}" required>
            <option th:each="type : ${exerciseTypes}" th:value="${type}" th:text="${type}">Running</option>
        </select>
        <p class="field-error" th:if="${#fields.hasErrors('exerciseActivity')}" th:errors="*{exerciseActivity}"></p>

        <label for="exerciseDuration" th:text="#{rec.field.duration}">Duration (minutes)</label>
        <input id="exerciseDuration" th:field="*{exerciseDuration}" type="number" min="1" max="1440" step="1" required>
        <p class="field-error" th:if="${#fields.hasErrors('exerciseDuration')}" th:errors="*{exerciseDuration}"></p>

        <label for="notes" th:text="#{rec.field.notes}">Notes</label>
        <textarea id="notes" th:field="*{notes}" rows="4" th:placeholder="#{rec.field.notes}"></textarea>
        <p class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></p>

        <div class="form-actions">
            <button class="button primary" type="submit" th:text="${editMode} ? #{rec.btn.update} : #{rec.btn.confirm}">Confirm</button>
            <a class="button secondary" th:href="@{/web/records}" th:text="#{rec.btn.cancel}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
