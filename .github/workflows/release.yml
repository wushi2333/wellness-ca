name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore debug keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          echo "Keystore file size: $(wc -c < ~/.android/debug.keystore) bytes"
          echo "SHA-1 fingerprint:"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey 2>/dev/null | grep -E "SHA1|SHA256" || echo "WARNING: Could not read SHA-1 — secret may be missing or invalid!"

      - name: Build debug APK
        working-directory: CA_Application
        run: ./gradlew assembleDebug

      - name: Verify APK signature SHA-1
        run: |
          APK="CA_Application/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK" ]; then
            echo "APK signing cert SHA-1:"
            keytool -printcert -jarfile "$APK" 2>/dev/null | grep SHA1 || echo "SHA-1 not found"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: CA_Application/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
