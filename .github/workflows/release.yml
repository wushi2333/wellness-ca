name: Build & Release APK + WinForm EXE

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ======================== Android APK ========================
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Restore debug keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK
        working-directory: CA_Application
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: CA_Application/app/build/outputs/apk/debug/app-debug.apk

  # ======================== WinForm EXE ========================
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Build WinForm EXE (self-contained single-file)
        working-directory: RecordYourWellnessApp
        run: >
          dotnet publish -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: List publish output
        run: Get-ChildItem RecordYourWellnessApp\publish\ | Select-Object Name, Length

      - name: Package EXE as zip
        run: >
          Compress-Archive
          -Path RecordYourWellnessApp\publish\RecordYourWellnessApp.exe
          -DestinationPath RecordYourWellnessApp-win-x64.zip

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: winform-exe
          path: RecordYourWellnessApp-win-x64.zip

  # ======================== Release ========================
  release:
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: winform-exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            *.apk
            *.zip
          generate_release_notes: true
